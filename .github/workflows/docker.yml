name: Build and publish a Docker image to ghcr.io
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: "ubuntu-24.04"
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name, so the mixed-case repo
          # (odinnordico/PrivUtil) becomes ghcr.io/odinnordico/privutil.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Stamp the release version into the binary (main.Version); the build
          # context has no .git, so the version cannot be derived inside the image.
          build-args: |
            VERSION=${{ github.ref_name }}

      - name: Verify version-pinned tag was published
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_REF_NAME}"
          echo "Verifying ${image} exists in the registry..."
          docker buildx imagetools inspect "${image}"
