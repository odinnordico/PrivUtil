name: Build and publish a Docker image to ghcr.io
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: "ubuntu-24.04"
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        # Needed to emulate the arm64 runtime stage's RUN (adduser) on the amd64 runner.
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract image metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name, so the mixed-case repo
          # (odinnordico/PrivUtil) becomes ghcr.io/odinnordico/privutil.
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Stamp the release version into the binary (main.Version); the build
          # context has no .git, so the version cannot be derived inside the image.
          build-args: |
            VERSION=${{ github.ref_name }}

      - name: Verify version-pinned multi-arch tag was published
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_REF_NAME}"
          echo "Verifying ${image} exists with linux/amd64 + linux/arm64..."
          raw="$(docker buildx imagetools inspect "${image}" --raw)"
          echo "${raw}"
          for arch in amd64 arm64; do
            echo "${raw}" | jq -e --arg a "${arch}" \
              '.manifests[] | select(.platform.os == "linux" and .platform.architecture == $a)' >/dev/null \
              || { echo "::error::missing linux/${arch} manifest in ${image}"; exit 1; }
          done
          echo "OK: ${image} publishes linux/amd64 and linux/arm64."
